services:
  - type: web
    name: elite-companion
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 8
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: INARA_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
